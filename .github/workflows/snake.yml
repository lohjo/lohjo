name: generate snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: Platane/snk/svg-only@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#0f6973&color_dots=#dfe7e9,#c9dfe2,#7eb4bd,#3a8a96,#0f6973
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#5fb3bd&color_dots=#21282d,#1f4a52,#2f7079,#4e9aa3,#7ec7cf

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
